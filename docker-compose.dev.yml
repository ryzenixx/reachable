x-laravel-env: &laravel-env
  APP_NAME: Reachable
  APP_ENV: local
  APP_DEBUG: "true"
  APP_KEY: ${APP_KEY:-base64:devkeydevkeydevkeydevkeydevkeydevkey12==}
  APP_URL: http://localhost:8009
  FRONTEND_URL: http://localhost:3000
  LOG_CHANNEL: stderr
  LOG_LEVEL: debug
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: reachable
  DB_USERNAME: reachable
  DB_PASSWORD: reachable
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_CLIENT: phpredis
  REDIS_DB: 0
  REDIS_CACHE_DB: 1
  QUEUE_CONNECTION: redis
  CACHE_STORE: redis
  SESSION_DRIVER: redis
  BROADCAST_CONNECTION: reverb
  REVERB_APP_ID: reachable-dev
  REVERB_APP_KEY: reachable-dev-key
  REVERB_APP_SECRET: reachable-dev-secret
  REVERB_HOST: reverb
  REVERB_PORT: 8080
  REVERB_SCHEME: http
  PHP_OPCACHE_VALIDATE_TIMESTAMPS: 1

x-laravel-service: &laravel-service
  build:
    context: ./api
    dockerfile: Dockerfile
  volumes:
    - ./api:/var/www/html
    - /var/www/html/vendor
  networks:
    - reachable

services:
  app:
    <<: *laravel-service
    container_name: reachable-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *laravel-env
      RUN_MIGRATIONS: "true"
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(@file_get_contents(\"http://127.0.0.1/api/v1/onboarding/state\") === false ? 1 : 0);'"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
    ports:
      - "8009:80"

  horizon:
    <<: *laravel-service
    container_name: reachable-horizon
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *laravel-env
    command: ["php", "artisan", "horizon"]

  reverb:
    <<: *laravel-service
    container_name: reachable-reverb
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *laravel-env
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    ports:
      - "8080:8080"

  scheduler:
    <<: *laravel-service
    container_name: reachable-scheduler
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *laravel-env
    command: ["php", "artisan", "schedule:work"]

  frontend:
    image: node:22-alpine
    container_name: reachable-frontend
    working_dir: /app
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8009/api/v1
      INTERNAL_API_URL: http://app/api/v1
      NEXT_PUBLIC_REVERB_APP_KEY: reachable-dev-key
      NEXT_PUBLIC_REVERB_HOST: localhost
      NEXT_PUBLIC_REVERB_PORT: 8080
      NEXT_PUBLIC_REVERB_SCHEME: http
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    command: ["sh", "-c", "npm install && npm run dev -- --hostname 0.0.0.0"]
    networks:
      - reachable

  postgres:
    image: postgres:16-alpine
    container_name: reachable-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: reachable
      POSTGRES_USER: reachable
      POSTGRES_PASSWORD: reachable
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reachable -d reachable"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - reachable_postgres_data:/var/lib/postgresql/data
    networks:
      - reachable

  redis:
    image: redis:7-alpine
    container_name: reachable-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - reachable

volumes:
  reachable_postgres_data:

networks:
  reachable:
    name: reachable-dev
