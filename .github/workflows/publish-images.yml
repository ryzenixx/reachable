name: Publish Docker Images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

concurrency:
  group: publish-images-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Reachable image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Normalize owner
        id: owner
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Read repository name
        id: repo
        run: echo "repo_name=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"

      - name: Validate release tag and branch
        id: version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          VERSION_REGEX='^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'
          VERSION="${TAG_NAME#v}"

          if ! [[ "${VERSION}" =~ ${VERSION_REGEX} ]]; then
            echo "Release tag must look like v1.2.3 (got: ${TAG_NAME})." >&2
            exit 1
          fi

          TAG_SHA="$(git rev-list -n 1 "${TAG_NAME}")"
          if [[ -z "${TAG_SHA}" ]]; then
            echo "Unable to resolve tag commit for ${TAG_NAME}." >&2
            exit 1
          fi

          if ! git branch -r --contains "${TAG_SHA}" | grep -q "origin/main"; then
            echo "Tag ${TAG_NAME} must point to a commit included in main." >&2
            exit 1
          fi

          ROOT_VERSION="$(tr -d '[:space:]' < VERSION)"

          if [[ "${ROOT_VERSION}" != "${VERSION}" ]]; then
            echo "VERSION file (${ROOT_VERSION}) does not match tag (${VERSION})." >&2
            exit 1
          fi

          SHORT_SHA="${TAG_SHA::7}"

          IMAGE="ghcr.io/${{ steps.owner.outputs.owner_lc }}/${{ steps.repo.outputs.repo_name }}"

          {
            echo "version=${VERSION}"
            echo "tags<<EOF"
            echo "${IMAGE}:latest"
            echo "${IMAGE}:${TAG_NAME}"
            echo "${IMAGE}:sha-${SHORT_SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.version.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=reachable
          cache-to: type=gha,mode=max,scope=reachable
          provenance: false
          sbom: false

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
